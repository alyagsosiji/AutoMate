<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMate RPA Project 1.1b</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="scanlines"></div>

    <div class="cyber-container">
        <div class="system-header">
            <span class="status-dot"></span> <span data-i18n="sysOnline">SYSTEM ONLINE</span>
        </div>
        
        <div id="login-section" class="section">
            <h1 class="neon-text-blue" data-i18n="loginTitle">ACCESS LOGIN</h1>
            <div class="input-group">
                <input type="email" id="login-email" data-i18n-placeholder="emailPh" placeholder="ENTER EMAIL" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-pw" data-i18n-placeholder="pwPh" placeholder="ENTER PASSWORD" required>
            </div>
            <button class="btn-cyber-blue" onclick="login()" data-i18n="loginBtn">INITIALIZE LOGIN</button>
            <p class="sub-text"><span data-i18n="noAccountText">NO ACCOUNT?</span> <a href="#" onclick="showSection('signup-section')" data-i18n="registerLink">[REGISTER]</a></p>
        </div>

        <div id="signup-section" class="section hidden">
            <h1 class="neon-text-pink" data-i18n="signupTitle">CREATE IDENTITY</h1>
            <div class="input-group">
                <input type="email" id="signup-email" data-i18n-placeholder="newEmailPh" placeholder="NEW EMAIL" required>
            </div>
            <div class="input-group">
                <input type="password" id="signup-pw" data-i18n-placeholder="newPwPh" placeholder="NEW PASSWORD" required>
            </div>
            <button class="btn-cyber-pink" onclick="signup()" data-i18n="signupBtn">REGISTER ACCOUNT</button>
            <p class="sub-text"><span data-i18n="existingIdentityText">EXISTING IDENTITY?</span> <a href="#" onclick="showSection('login-section')" data-i18n="loginLink">[LOGIN]</a></p>
        </div>

        <div id="category-section" class="section hidden">
            <h1 class="neon-text-blue" data-i18n="sectorTitle">SECTOR SELECTION</h1>
            <p class="info-text" data-i18n="sectorInfo">// SELECT NEWS CATEGORIES FOR UIPATH PROCESSING</p>
            
            <div class="cyber-categories">
                <label class="cyber-checkbox">
                    <input type="checkbox" value="정치/사회">
                    <span class="chk-box"></span> <span data-i18n="cat1">01 // POLITICS & SOCIETY</span>
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" value="IT/과학">
                    <span class="chk-box"></span> <span data-i18n="cat2">02 // IT & SCIENCE</span>
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" value="경제/금융">
                    <span class="chk-box"></span> <span data-i18n="cat3">03 // ECONOMY & FINANCE</span>
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" value="문화/연예">
                    <span class="chk-box"></span> <span data-i18n="cat4">04 // CULTURE & ENTERTAINMENT</span>
                </label>
            </div>
            
            <button class="btn-cyber-blue" onclick="saveCategories()" data-i18n="saveBtn">SAVE & TRANSMIT DATA</button>
            <button class="btn-cyber-secondary" onclick="logout()" data-i18n="disconnectBtn">DISCONNECT</button>
        </div>

        <div id="admin-section" class="section hidden">
            <h1 class="neon-text-pink" data-i18n="adminTitle">SYSTEM ADMIN</h1>
            <p class="info-text" data-i18n="adminInfo">// DATABASE OVERRIDE AUTHORIZED</p>
            
            <div class="admin-tabs">
                <button id="tab-users" class="tab-btn active" onclick="switchAdminTab('users')" data-i18n="tabUsers">USER RECORDS</button>
                <button id="tab-logs" class="tab-btn" onclick="switchAdminTab('logs')" data-i18n="tabLogs">SYSTEM LOGS</button>
            </div>

            <div id="admin-user-list" class="admin-view"></div>
            <div id="admin-log-list" class="admin-view hidden"></div>

            <button class="btn-cyber-secondary" style="margin-top:20px;" onclick="logout()" data-i18n="disconnectSysBtn">DISCONNECT SYSTEM</button>
        </div>
    </div>

    <footer class="cyber-footer">
        <div class="lang-selector">
            <span id="lang-en" class="lang-btn active" onclick="setLanguage('en')">EN</span>
            <span class="lang-divider">|</span>
            <span id="lang-ko" class="lang-btn" onclick="setLanguage('ko')">KO</span>
        </div>
        <div data-i18n="footerText">
            &copy; 2026. alyagsosiji. website code.<br>
            &copy; 2026. AutoMate. RPA Project.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
