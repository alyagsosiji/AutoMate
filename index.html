<div class="scanlines"></div>

    <div class="cyber-container">
        <div class="system-header">
            <span class="status-dot"></span> SYSTEM ONLINE
        </div>
        
        <div id="login-section" class="section">
            <h1 class="neon-text-blue">ACCESS LOGIN</h1>
            <div class="input-group">
                <input type="email" id="login-email" placeholder="ENTER EMAIL" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-pw" placeholder="ENTER PASSWORD" required>
            </div>
            <button class="btn-cyber-blue" onclick="login()">INITIALIZE LOGIN</button>
            <p class="sub-text">NO ACCOUNT? <a href="#" onclick="showSection('signup-section')">[REGISTER]</a></p>
        </div>

        <div id="signup-section" class="section hidden">
            <h1 class="neon-text-pink">CREATE IDENTITY</h1>
            <div class="input-group">
                <input type="email" id="signup-email" placeholder="NEW EMAIL" required>
            </div>
            <div class="input-group">
                <input type="password" id="signup-pw" placeholder="NEW PASSWORD" required>
            </div>
            <button class="btn-cyber-pink" onclick="signup()">REGISTER ACCOUNT</button>
            <p class="sub-text">EXISTING IDENTITY? <a href="#" onclick="showSection('login-section')">[LOGIN]</a></p>
        </div>

        <div id="category-section" class="section hidden">
            <h1 class="neon-text-blue">SECTOR SELECTION</h1>
            <p class="info-text">// SELECT NEWS CATEGORIES FOR UIPATH PROCESSING</p>
            
            <div class="cyber-categories">
                <label class="cyber-checkbox">
                    <input type="checkbox" value="정치/사회">
                    <span class="chk-box"></span> 01 // POLITICS & SOCIETY
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" value="IT/과학">
                    <span class="chk-box"></span> 02 // IT & SCIENCE
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" value="경제/금융">
                    <span class="chk-box"></span> 03 // ECONOMY & FINANCE
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" value="문화/연예">
                    <span class="chk-box"></span> 04 // CULTURE & ENTERTAINMENT
                </label>
            </div>
            
            <button class="btn-cyber-blue" onclick="saveCategories()">SAVE & TRANSMIT DATA</button>
            <button class="btn-cyber-secondary" onclick="logout()">DISCONNECT</button>
        </div>

        <div id="admin-section" class="section hidden">
            <h1 class="neon-text-pink">SYSTEM ADMIN</h1>
            <p class="info-text">// DATABASE OVERRIDE AUTHORIZED</p>
            <div id="admin-user-list"></div>
            <button class="btn-cyber-secondary" onclick="logout()">DISCONNECT SYSTEM</button>
        </div>
    </div>

    <footer class="cyber-footer">
        &copy; 2026. alyagsosiji. website code.
        &copy; 2026. AutoMate. RPA Project.
    </footer>

    <script src="script.js"></script>
